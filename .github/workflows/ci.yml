name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install httpx pytest pytest-asyncio

      - name: Run tests
        run: python -m pytest test_smart_router.py test_atomic_chat_provider.py test_ollama_provider.py -v
